<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Rocky Hijab Pusat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="loader-ring"></div>
    <p style="font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.07em">MEMPROSES</p>
  </div>
  <div id="toast">Toast</div>

  <div id="transaction-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px">
        <div>
          <h3 id="transaction-modal-title" style="font-size:16px;font-weight:800;letter-spacing:-.02em">Transaksi</h3>
        </div>
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="width:36px;height:36px;padding:0;border-radius:12px"><i class="fas fa-xmark"></i></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div id="modal-pos-user-wrap" style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">User Transaksi</p>
          <select id="modal-pos-user" class="g-input" style="background:none;border:none;padding:4px 0 2px;font-size:15px;line-height:1.45;min-height:34px;display:block;width:100%"></select>
        </div>
        <div id="modal-pos-product-wrap" style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Rincian Barang</p>
          <input id="modal-pos-note" type="hidden">
          <div class="modal-product-entry">
            <input id="modal-pos-item" type="text" placeholder="Nama barang..." autocomplete="off" class="g-input" oninput="updateModalTransactionItemButton()" onkeydown="handleModalTransactionItemKey(event)">
            <button id="modal-pos-item-add" type="button" class="btn btn-primary" onclick="addModalTransactionItem()" disabled>+ Tambah Barang</button>
          </div>
          <p class="label-xs" style="margin-top:8px;margin-bottom:5px">Daftar Barang</p>
          <div id="modal-pos-item-list" class="modal-product-list"></div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px">
          <p class="label-xs">Nominal</p>
          <input id="modal-pos-amount" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" autocomplete="off" class="amount-display" data-numeric="0">
        </div>
      </div>
      <div id="modal-pos-status" style="margin:14px 0 0"></div>
      <div id="transaction-modal-actions" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:16px">
        <button onclick="closeTransactionModal()" class="btn btn-glass" style="padding:12px;font-size:13px">Batal</button>
        <button id="transaction-modal-print-btn" onclick="handleTransactionModalPrint()" class="btn btn-success" style="padding:12px;font-size:13px"><i class="fas fa-print"></i> Cetak</button>
        <button id="transaction-modal-save-btn" onclick="handleTransactionModalSave()" class="btn btn-primary" style="padding:12px;font-size:13px">Simpan</button>
      </div>
    </div>
  </div>



  <div id="transaction-payment-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px">
        <div>
          <h3 style="font-size:16px;font-weight:800;letter-spacing:-.02em">Pilih Pembayaran</h3>
          <p style="font-size:11.5px;color:var(--text-soft);margin-top:3px">Cash atau QRIS / Transfer</p>
        </div>
        <button onclick="closeTransactionPaymentModal()" class="btn btn-glass" style="width:36px;height:36px;padding:0;border-radius:12px"><i class="fas fa-xmark"></i></button>
      </div>
      <div id="transaction-payment-summary" style="background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 13px;margin-bottom:12px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button id="transaction-pay-cash" data-transaction-payment-choice="cash" onpointerdown="confirmTransactionPayment('cash',this,event)" ontouchstart="confirmTransactionPayment('cash',this,event)" onclick="confirmTransactionPayment('cash',this,event)" class="btn btn-success" style="min-height:56px;font-size:13px"><i class="fas fa-money-bill-wave"></i> Cash</button>
        <button id="transaction-pay-qris" data-transaction-payment-choice="qris_transfer" onpointerdown="confirmTransactionPayment('qris_transfer',this,event)" ontouchstart="confirmTransactionPayment('qris_transfer',this,event)" onclick="confirmTransactionPayment('qris_transfer',this,event)" class="btn btn-primary" style="min-height:56px;font-size:13px"><i class="fas fa-qrcode"></i> QRIS / Transfer</button>
      </div>
      <button onclick="closeTransactionPaymentModal()" class="btn btn-danger" style="width:100%;margin-top:10px;padding:12px;font-size:13px">Batal</button>
    </div>
  </div>


  <div id="receipt-preview-modal" class="modal-wrap">
    <div class="modal-sheet">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px">
        <div>
          <h3 id="receipt-preview-title" style="font-size:16px;font-weight:800;letter-spacing:-.02em">Struk Transaksi</h3>
          <p style="font-size:11.5px;color:var(--text-soft);margin-top:3px">Preview struk sebelum cetak</p>
        </div>
        <button onclick="closeReceiptPreview()" class="btn btn-glass" style="width:36px;height:36px;padding:0;border-radius:12px"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="receipt-preview-box"><pre id="receipt-preview-text" class="receipt-preview-text"></pre></div>
      <div class="receipt-modal-actions">
        <button onclick="closeReceiptPreview()" class="btn btn-glass" style="padding:11px;font-size:12px"><i class="fas fa-xmark"></i> Tutup</button>
        <button onclick="nativePrintReceiptText()" class="btn btn-primary" style="padding:11px;font-size:12px"><i class="fas fa-print"></i> Cetak</button>
      </div>
    </div>
  </div>

  <div id="page-content"></div>

  <nav id="bottom-nav" style="display:none">
    <button onclick="router.navigate('home')" id="nav-home" class="nav-item"><i class="fas fa-house"></i><span id="nav-home-label">Beranda</span></button>
    <button onclick="router.navigate('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt"></i><span id="nav-history-label">Riwayat</span></button>
    <button onclick="router.navigate('report')" id="nav-report" class="nav-item"><i class="fas fa-chart-line"></i><span id="nav-report-label">Laporan</span></button>
    <button onclick="router.navigate('attendance')" id="nav-attendance" class="nav-item"><i class="fas fa-user-clock"></i><span id="nav-attendance-label">Absen</span></button>
    <button onclick="router.navigate('closing')" id="nav-closing" class="nav-item"><i class="fas fa-lock"></i><span id="nav-closing-label">Closing</span></button>
    <button onclick="router.navigate('settings')" id="nav-settings" class="nav-item"><i class="fas fa-gear"></i><span id="nav-settings-label">Setelan</span></button>
  </nav>

  <button id="fab-pos" class="fab-add" type="button" aria-hidden="true" tabindex="-1" style="display:none!important"></button>
</div>
<script type="module" src="./js/app.js"></script>
<script src="./js/modal-keyboard-fix.js"></script>

</body>
</html>
